modules = [
  "splash",
  "pmodel",
  "sgam",
  "rothc",
]

targets = [
  "saved_daily_outputs",
  "saved_weekly_outputs",
  "saved_monthly_outputs",
]

[inputs]
daily = [
  "precipitation_mm",
  "sunshine_fraction",
  "temperature_celcius",
  "lai",
  "gpp",
]

weekly = [
  "co2_ppm",
  "fapar",
  "ppfd_umol_m2_s1",
  "pressure_pa",
  "vpd_pa",
]

weekly_from_daily = [
  "temperature_celcius",
  "precipitation_mm",
  "soil_moisture",
  "aridity_index",
]

monthly = [
  "dummy_variable",
]

monthly_from_daily = [
  "temperature_celcius",
  "precipitation_mm",
  "actual_evapotranspiration",
]

monthly_from_weekly = [
  "litter_to_soil",
]

static = [
  "elevation",
  "plant_type",
  "max_soil_moisture",
  "clay_content",
  "soil_depth",
  "organic_carbon_stocks",
  "root_pool_init",
  "leaf_pool_init",
  "stem_pool_init",
]

[config]
method_kphio = "sandoval"
method_optchi = "lavergne20_c3"
n_years_spinup = 1
daily_inputs_path = "src/satterc/extras/data/daily.nc"
weekly_inputs_path = "src/satterc/extras/data/weekly.nc"
monthly_inputs_path = "src/satterc/extras/data/monthly.nc"
static_inputs_path = "src/satterc/extras/data/static.nc"

daily_outputs_path = "results/daily.nc"
weekly_outputs_path = "results/weekly.nc"
monthly_outputs_path = "results/monthly.nc"

[outputs]
daily_outputs_vars = [
  "actual_evapotranspiration",
  "soil_moisture",
  "runoff",
]

weekly_outputs_vars = [
  "gpp",
  "lue",
  "iwue",
  "leaf_pool_size",
  "stem_pool_size",
  "root_pool_size",
  "leaf_respiration_loss",
  "stem_respiration_loss",
  "root_respiration_loss",
  "litter_to_soil",
  "disturbance_loss",
  "leaf_area_index",
  "npp",
  "cue",
]

monthly_outputs_vars = [
  "decomposable_plant_material",
  "resistant_plant_material",
  "microbial_biomass",
  "humified_organic_matter",
  "soil_organic_carbon",
]
